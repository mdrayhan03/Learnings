version: '3.8'

services:
  # 1. The Gateway (Reverse Proxy)
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80" # Exposed to your laptop
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_app_1
      - flask_app_2
      - flask_app_3

  # 2. The Internal Hidden Flask App
  # mem_limit caps RSS. /crash leaks ~30MB/req, so each container dies
  # after roughly 5-6 hits. restart: on-failure brings it back so you
  # can watch nginx route around the dead upstream, then re-balance.
  flask_app_1:
    build: ./flask_app_1
    mem_limit: 200m
    memswap_limit: 200m   # disable swap so OOMKill happens immediately
    cpus: 0.5             # cap CPU so the burn loop saturates fast
    restart: on-failure

  flask_app_2:
    build: ./flask_app_2
    mem_limit: 200m
    memswap_limit: 200m
    cpus: 0.5
    restart: on-failure

  flask_app_3:
    build: ./flask_app_3
    mem_limit: 200m
    memswap_limit: 200m
    cpus: 0.5
    restart: on-failure